services:
  synth-generator:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${SYNTH_DATABASE_URI}
      CUSTOMER_COUNT: ${CUSTOMER_COUNT:-4000}
      SALES_COUNT: ${SALES_COUNT:-150000}
      PAYMENT_COUNT: ${PAYMENT_COUNT:-150000}
      RG_COUNT: ${RG_COUNT:-35000}
      BATCH_SIZE: ${BATCH_SIZE:-5000}
      SYNTH_SEED: ${SYNTH_SEED:-42}
      DATE_RANGE_MONTHS: ${DATE_RANGE_MONTHS:-120}
    restart: "no"
